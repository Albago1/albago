<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AlbaGo</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #050505;
    color: #fff;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  h1 { font-family: Georgia, serif; font-weight: 400; font-size: 2rem; }
  h1 em { color: #ee1c25; font-style: italic; }
  p { margin-top: 0.75rem; color: rgba(255,255,255,0.55); font-size: 0.9rem; }
</style>
</head>
<body>
<!-- Shown only if the shell cannot reach www.albago.org on first load. -->
<main>
  <h1>Alba<em>Go</em></h1>
  <p>Connect to the internet to continue.</p>
</main>
<script>
  var retry = setInterval(function () {
    fetch('https://www.albago.org', { mode: 'no-cors' })
      .then(function () { clearInterval(retry); location.href = 'https://www.albago.org'; })
      .catch(function () {});
  }, 3000);
</script>
</body>
</html>
